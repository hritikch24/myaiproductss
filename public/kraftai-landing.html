  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

9.878 9.878 0 01-5.03-1.375l-.36-.214-3.742.977.998-3.628-.235-.375A9.856 9.856 0 012.106 12C2.106 6.53 6.531 2.106 12 2.106S21.894 6.53 21.894 12 17.469 21.894 12 21.894z\"><\u002Fpath><\u002Fsvg>\n      Chat on WhatsApp\n    <\u002Fa>\n    <a href=\"mailto:hritikchaudhary016@gmail.com?subject=Project%20Inquiry\" class=\"btn-outline\">Send an Email →<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-logo\">Kraft<b>AI<\u002Fb><\u002Fdiv>\n  <ul class=\"footer-nav\">\n    <li><a href=\"#services\">Services<\u002Fa><\u002Fli>\n    <li><a href=\"#process\">Process<\u002Fa><\u002Fli>\n    <li><a href=\"#why\">Why Us<\u002Fa><\u002Fli>\n    <li><a href=\"#cta\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n  <div class=\"footer-note\">© 2026 KraftAI · kraftai.in<\u002Fdiv>\n<\u002Ffooter>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\">\n  <h4>Tweaks<\u002Fh4>\n  <div class=\"tw-row\">\n    <label class=\"tw-label\">Accent color<\u002Flabel>\n    <div class=\"tw-swatches\">\n      <div class=\"swatch active\" style=\"background:#00ffe0\" onclick=\"setAccent(this,'#00ffe0','0,255,224')\"><\u002Fdiv>\n      <div class=\"swatch\" style=\"background:#7c5cfc\" onclick=\"setAccent(this,'#7c5cfc','124,92,252')\"><\u002Fdiv>\n      <div class=\"swatch\" style=\"background:#ff2d78\" onclick=\"setAccent(this,'#ff2d78','255,45,120')\"><\u002Fdiv>\n      <div class=\"swatch\" style=\"background:#ffb830\" onclick=\"setAccent(this,'#ffb830','255,184,48')\"><\u002Fdiv>\n      <div class=\"swatch\" style=\"background:#39ff14\" onclick=\"setAccent(this,'#39ff14','57,255,20')\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"tw-row\">\n    <label class=\"tw-label\">Hero particle density<\u002Flabel>\n    <input type=\"range\" min=\"20\" max=\"140\" value=\"70\" oninput=\"setParticleDensity(+this.value)\">\n  <\u002Fdiv>\n  <div class=\"tw-row\">\n    <label class=\"tw-label\">Background tone<\u002Flabel>\n    <select onchange=\"setBgTone(this.value)\">\n      <option value=\"space\">Deep space (default)<\u002Foption>\n      <option value=\"ocean\">Midnight ocean<\u002Foption>\n      <option value=\"obsidian\">Obsidian<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// ── CUSTOM CURSOR ──\nconst dot = document.getElementById('cursor-dot');\nconst ring = document.getElementById('cursor-ring');\nlet mx = 0, my = 0, rx = 0, ry = 0;\ndocument.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx+'px'; dot.style.top = my+'px'; });\n(function animRing() {\n  rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;\n  ring.style.left = rx+'px'; ring.style.top = ry+'px';\n  requestAnimationFrame(animRing);\n})();\n\n// ── HERO CANVAS ──\nconst heroCanvas = document.getElementById('hero-canvas');\nconst hCtx = heroCanvas.getContext('2d');\nlet hParticles = [];\nlet hDensity = 70;\nlet accentRgb = '0,255,224';\n\nfunction resizeHeroCanvas() {\n  heroCanvas.width = heroCanvas.offsetWidth;\n  heroCanvas.height = heroCanvas.offsetHeight;\n}\nresizeHeroCanvas();\nwindow.addEventListener('resize', () => { resizeHeroCanvas(); initHeroParticles(); });\n\nfunction initHeroParticles() {\n  hParticles = [];\n  for (let i = 0; i < hDensity; i++) {\n    hParticles.push({\n      x: Math.random() * heroCanvas.width, y: Math.random() * heroCanvas.height,\n      vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.35,\n      r: Math.random()*2+0.5,\n    });\n  }\n}\ninitHeroParticles();\n\nfunction drawHero() {\n  hCtx.clearRect(0,0,heroCanvas.width,heroCanvas.height);\n  for (let i = 0; i < hParticles.length; i++) {\n    const p = hParticles[i];\n    p.x += p.vx; p.y += p.vy;\n    if (p.x < 0 || p.x > heroCanvas.width) p.vx *= -1;\n    if (p.y < 0 || p.y > heroCanvas.height) p.vy *= -1;\n    hCtx.beginPath();\n    hCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);\n    hCtx.fillStyle = `rgba(${accentRgb},0.5)`;\n    hCtx.fill();\n    for (let j = i+1; j < hParticles.length; j++) {\n      const q = hParticles[j];\n      const d = Math.hypot(p.x-q.x, p.y-q.y);\n      if (d < 150) {\n        hCtx.beginPath();\n        hCtx.moveTo(p.x, p.y); hCtx.lineTo(q.x, q.y);\n        hCtx.strokeStyle = `rgba(${accentRgb},${(1-d/150)*0.18})`;\n        hCtx.lineWidth = 0.8; hCtx.stroke();\n      }\n    }\n  }\n  requestAnimationFrame(drawHero);\n}\ndrawHero();\n\n// ── SCRAMBLE TEXT ──\nconst chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&';\nconst target = document.getElementById('scramble-target');\nconst originalText = 'Build.';\nlet scrambleInterval;\nfunction startScramble() {\n  let iter = 0;\n  clearInterval(scrambleInterval);\n  scrambleInterval = setInterval(() => {\n    target.textContent = originalText.split('').map((c, i) => {\n      if (c === '.' || c === ' ') return c;\n      if (i < iter) return originalText[i];\n      return chars[Math.floor(Math.random() * chars.length)];\n    }).join('');\n    if (iter >= originalText.length) { clearInterval(scrambleInterval); target.textContent = originalText; }\n    iter += 0.5;\n  }, 40);\n}\nsetTimeout(startScramble, 1200);\nsetInterval(startScramble, 7000);\n\n// ── ORB CANVAS ──\nconst orbCanvas = document.getElementById('orb-canvas');\nconst oCtx = orbCanvas.getContext('2d');\nlet orbPhase = 0;\nlet activeStep = 0;\nconst orbHues = [185, 210, 260, 40];\n\nfunction resizeOrb() {\n  const wrap = orbCanvas.parentElement;\n  orbCanvas.width = wrap.offsetWidth;\n  orbCanvas.height = wrap.offsetHeight;\n}\nresizeOrb();\n\nlet orbT = 0;\nfunction drawOrb() {\n  const w = orbCanvas.width, h = orbCanvas.height;\n  oCtx.clearRect(0,0,w,h);\n  orbT += 0.015;\n  const hue = orbHues[activeStep];\n\n  // grid\n  oCtx.strokeStyle = `hsla(${hue},60%,60%,0.06)`;\n  oCtx.lineWidth = 1;\n  for (let x = 0; x < w; x += 36) { oCtx.beginPath(); oCtx.moveTo(x,0); oCtx.lineTo(x,h); oCtx.stroke(); }\n  for (let y = 0; y < h; y += 36) { oCtx.beginPath(); oCtx.moveTo(0,y); oCtx.lineTo(w,y); oCtx.stroke(); }\n\n  // rings\n  for (let i = 0; i < 4; i++) {\n    const t = (orbT + i * 1.6) % 4;\n    const r = (t/4) * Math.min(w,h)*0.42;\n    const a = (1 - t/4) * 0.35;\n    oCtx.beginPath();\n    oCtx.arc(w/2, h/2, r, 0, Math.PI*2);\n    oCtx.strokeStyle = `hsla(${hue},80%,60%,${a})`;\n    oCtx.lineWidth = 1.5;\n    oCtx.stroke();\n  }\n\n  // orb\n  const g = oCtx.createRadialGradient(w/2,h/2,0,w/2,h/2,56);\n  g.addColorStop(0, `hsla(${hue},80%,65%,1)`);\n  g.addColorStop(0.5, `hsla(${hue},80%,65%,0.5)`);\n  g.addColorStop(1, `hsla(${hue},80%,65%,0)`);\n  oCtx.beginPath(); oCtx.arc(w/2,h/2,56,0,Math.PI*2);\n  oCtx.fillStyle = g; oCtx.fill();\n\n  // phase number\n  oCtx.font = `800 72px Syne, sans-serif`;\n  oCtx.fillStyle = `hsla(${hue},60%,60%,0.1)`;\n  oCtx.textAlign = 'center'; oCtx.textBaseline = 'middle';\n  oCtx.fillText(`0${activeStep+1}`, w/2, h/2);\n\n  requestAnimationFrame(drawOrb);\n}\ndrawOrb();\n\n// Process accordion\ndocument.querySelectorAll('.p-step').forEach((step, i) => {\n  step.addEventListener('click', () => {\n    document.querySelectorAll('.p-step').forEach(s => s.classList.remove('open'));\n    step.classList.add('open');\n    activeStep = i;\n  });\n});\n// Auto-rotate\nlet stepI = 0;\nsetInterval(() => {\n  stepI = (stepI+1)%4;\n  document.querySelectorAll('.p-step').forEach(s => s.classList.remove('open'));\n  document.querySelectorAll('.p-step')[stepI].classList.add('open');\n  activeStep = stepI;\n}, 3500);\n\n// ── COUNT UP ──\nconst countEls = document.querySelectorAll('.count');\nconst countObserver = new IntersectionObserver(entries => {\n  entries.forEach(e => {\n    if (!e.isIntersecting) return;\n    const el = e.target;\n    const target = +el.dataset.target;\n    const dur = 1600;\n    const start = performance.now();\n    function tick(now) {\n      const p = Math.min((now - start) / dur, 1);\n      el.textContent = Math.round(p * target);\n      if (p < 1) requestAnimationFrame(tick);\n    }\n    requestAnimationFrame(tick);\n    countObserver.unobserve(el);\n  });\n}, { threshold: 0.5 });\ncountEls.forEach(el => countObserver.observe(el));\n\n// ── SCROLL REVEAL ──\nconst revObserver = new IntersectionObserver(entries => {\n  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });\n}, { threshold: 0.1 });\ndocument.querySelectorAll('.reveal').forEach(el => revObserver.observe(el));\n\n// ── BENTO CARD MOUSE GLOW ──\ndocument.querySelectorAll('.bento-card').forEach(card => {\n  card.addEventListener('mousemove', e => {\n    const r = card.getBoundingClientRect();\n    card.style.setProperty('--mx', (e.clientX - r.left) + 'px');\n    card.style.setProperty('--my', (e.clientY - r.top) + 'px');\n  });\n});\n\n// ── TWEAKS ──\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#00ffe0\",\n  \"accentRgb\": \"0,255,224\",\n  \"particleDensity\": 70,\n  \"bgTone\": \"space\"\n}/*EDITMODE-END*/;\n\nfunction setAccent(el, hex, rgb) {\n  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));\n  el.classList.add('active');\n  accentRgb = rgb;\n  document.documentElement.style.setProperty('--cyan', hex);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{accentColor:hex,accentRgb:rgb}}, '*');\n}\nfunction setParticleDensity(v) {\n  hDensity = v; initHeroParticles();\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{particleDensity:v}}, '*');\n}\nfunction setBgTone(v) {\n  const tones = {\n    space: ['#050508','#08080f','#030306'],\n    ocean: ['#020916','#04102a','#02060f'],\n    obsidian: ['#07070a','#0d0d12','#050507'],\n  };\n  const [bg, surface, footer] = tones[v] || tones.space;\n  document.documentElement.style.setProperty('--bg', bg);\n  document.documentElement.style.setProperty('--surface', surface);\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{bgTone:v}}, '*');\n}\n\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').style.display = 'block';\n  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').style.display = 'none';\n});\nwindow.parent.postMessage({type:'__edit_mode_available'}, '*');\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
